// serverDZ.example.cfg
// Example DayZ dedicated server configuration.
// The DayZ Manager UI generates this file for you - this copy is for reference.

hostname = "My Awesome DayZ Server";
password = "";
passwordAdmin = "change-this-very-strong-secret";
maxPlayers = 60;
verifySignatures = 2;
forceSameBuild = 1;
disableVoN = 0;
vonCodecQuality = 20;
disable3rdPerson = 0;
disableCrosshair = 0;
serverTime = "SystemTime";
serverTimeAcceleration = 12;
serverNightTimeAcceleration = 1;
serverTimePersistent = 1;
guaranteedUpdates = 1;
loginQueueConcurrentPlayers = 5;
loginQueueMaxPlayers = 500;
instanceId = 1;
storageAutoFix = 1;
steamQueryPort = 27016;
enableMouseAndKeyboard = 1;
serverFpsLimit = 60;

class Missions
{
    class DayZ
    {
        template = "dayzOffline.chernarusplus";
    };
};

motd[] = {
    "Welcome to my DayZ server!",
    "Have fun and play fair."
};
motdInterval = 1;
